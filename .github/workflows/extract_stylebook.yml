name: 提炼写作手册

on:
  workflow_dispatch:
    inputs:
      author:
        description: '指定作者（留空则全部提炼）'
        required: false
        default: ''

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 提炼写作手册
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.author }}" ]; then
            python extract_stylebook.py "${{ github.event.inputs.author }}"
          else
            python extract_stylebook.py
          fi

      - name: 上传本地备份
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stylebooks
          path: stylebook_*.md
